<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>디지털 교육 생각노트</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:sans-serif;
background:#f4f6fb;
padding:30px;
display:flex;
flex-direction:column;
align-items:center;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:400px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

h2{
text-align:center;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

.posts{
width:700px;
max-width:95%;
}

.post{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="box">

<h2>디지털 교육 생각노트</h2>

<select id="week">
<option value="">주차 선택</option>
<option>2주차</option>
<option>3주차</option>
<option>4주차</option>
<option>5주차</option>
<option>6주차</option>
<option>7주차</option>
<option>8주차</option>
<option>9주차</option>
<option>10주차</option>
<option>11주차</option>
<option>12주차</option>
<option>13주차</option>
</select>

<select id="class">
<option value="">반 선택</option>
<option>A반</option>
<option>B반</option>
<option>C반</option>
<option>D반</option>
</select>

<input id="nickname" placeholder="별명">

<textarea id="content" placeholder="오늘 질문에 대한 생각을 작성하세요"></textarea>

<button onclick="save()">생각 올리기</button>

</div>

<div class="posts" id="posts"></div>

<script>

const supabaseClient = window.supabase.createClient(
"https://xjsrmomkqycbuyfgdzen.supabase.co",
"sb_publishable_q8cGT0VAmshe-my_VWA7kA_H5XTA09_"
)

async function save(){

const nickname=document.getElementById("nickname").value
const className=document.getElementById("class").value
const week=document.getElementById("week").value
const content=document.getElementById("content").value

await supabaseClient.from("notes").insert([
{
nickname:nickname,
class:className,
week:week,
content:content
}
])

document.getElementById("content").value=""

loadPosts()

}

async function loadPosts(){

const { data } = await supabaseClient
.from("notes")
.select("*")
.order("created_at",{ascending:false})

const container=document.getElementById("posts")

container.innerHTML=""

data.forEach(post=>{

const div=document.createElement("div")
div.className="post"

div.innerHTML=
"<b>"+post.week+" "+post.class+" "+post.nickname+"</b><br>"+post.content

container.appendChild(div)

})

}

loadPosts()

setInterval(loadPosts,2000)

</script>

</body>
</html>
