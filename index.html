<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 교육 생각노트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f4f6fb;
      color: #222;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .top-title {
      text-align: center;
      margin-bottom: 20px;
    }

    .top-title h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
      color: #2d3a4b;
    }

    .top-title p {
      margin-top: 10px;
      color: #667085;
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 16px 0;
      font-size: 22px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin: 12px 0 6px;
      color: #344054;
    }

    select, input, textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.5;
    }

    .question-box {
      margin-top: 14px;
      background: #f8fafc;
      border: 1px solid #e4e7ec;
      border-radius: 14px;
      padding: 14px;
    }

    .question-title {
      font-size: 13px;
      font-weight: 800;
      color: #475467;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 15px;
      line-height: 1.6;
      color: #1d2939;
      white-space: pre-line;
    }

    .btn {
      margin-top: 16px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      background: #6ea95b;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(0.97);
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
      color: #2e7d32;
      min-height: 20px;
    }

    .board-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .board-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .board-sub {
      color: #667085;
      font-size: 14px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .note {
      border-radius: 18px;
      padding: 16px;
      min-height: 170px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transform: rotate(-1deg);
    }

    .note:nth-child(2n) { transform: rotate(1deg); }
    .note:nth-child(3n) { transform: rotate(-0.5deg); }

    .note.yellow { background: #fff6b7; }
    .note.pink   { background: #ffd6e7; }
    .note.blue   { background: #d9efff; }
    .note.green  { background: #dff6d8; }
    .note.lilac  { background: #ece3ff; }

    .meta {
      font-size: 13px;
      font-weight: 800;
      color: #344054;
      margin-bottom: 10px;
    }

    .content {
      font-size: 15px;
      line-height: 1.55;
      color: #222;
      white-space: pre-line;
      word-break: break-word;
      flex: 1;
    }

    .time {
      margin-top: 14px;
      font-size: 12px;
      color: #667085;
      text-align: right;
    }

    .empty {
      background: #fff;
      border: 2px dashed #d0d5dd;
      border-radius: 18px;
      padding: 40px 20px;
      text-align: center;
      color: #667085;
    }

    .footer-tip {
      margin-top: 16px;
      font-size: 13px;
      color: #667085;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .top-title h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title">
      <h1>디지털 교육 생각노트</h1>
      <p>주차별 질문에 대해 생각을 남기고, 서로의 생각을 함께 읽어봅시다.</p>
    </div>

    <div class="layout">
      <div class="panel">
        <h2>생각 올리기</h2>

        <label for="week">주차</label>
        <select id="week">
          <option value="2">2주차</option>
          <option value="3">3주차</option>
          <option value="4">4주차</option>
          <option value="5">5주차</option>
          <option value="6">6주차</option>
          <option value="7">7주차</option>
          <option value="8">8주차</option>
          <option value="9">9주차</option>
          <option value="10">10주차</option>
          <option value="11">11주차</option>
          <option value="12">12주차</option>
          <option value="13">13주차</option>
        </select>

        <label for="class">반</label>
        <select id="class">
          <option value="">반 선택</option>
          <option value="A반">A반</option>
          <option value="B반">B반</option>
          <option value="C반">C반</option>
          <option value="D반">D반</option>
        </select>

        <label for="nickname">별명</label>
        <input id="nickname" type="text" placeholder="예: 숲속지기, 별빛, 파랑새" />

        <div class="question-box">
          <div class="question-title">이번 주 질문</div>
          <div class="question-text" id="questionText"></div>
        </div>

        <label for="content">생각 쓰기</label>
        <textarea id="content" placeholder="질문을 읽고 자신의 생각을 자유롭게 적어보세요."></textarea>

        <button class="btn" onclick="saveNote()">생각 올리기</button>
        <div class="status" id="statusMsg"></div>
        <div class="footer-tip">같은 주차를 선택하면 아래 게시판에 해당 주차의 생각들이 보입니다.</div>
      </div>

      <div class="panel">
        <div class="board-head">
          <div>
            <h2>생각 담벼락</h2>
            <div class="board-sub" id="boardSub">현재 선택한 주차의 글을 보여줍니다.</div>
          </div>
        </div>

        <div id="notesWrap">
          <div class="empty">아직 올라온 생각이 없습니다.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://xjsrmomkqycbuyfgdzen.supabase.co",
      "sb_publishable_q8cGT0VAmshe-my_VWA7kA_H5XTA09_"
    );

    const QUESTIONS = {
      2: "이번 수업 내용을 통해 디지털 교육이 왜 필요한지, 자신의 생각을 적어보세요.",
      3: "오늘 다룬 내용 중 가장 인상 깊었던 점은 무엇이었나요? 그 이유도 함께 적어보세요.",
      4: "디지털 도구가 유아교육에서 어떤 가능성을 가질 수 있다고 생각하나요?",
      5: "오늘 수업의 개념을 실제 교육 현장에 적용한다면 어떤 방식으로 활용할 수 있을까요?",
      6: "디지털 교육의 장점과 함께 주의해야 할 점은 무엇이라고 생각하나요?",
      7: "오늘 활동을 통해 새롭게 알게 된 점이나 생각이 바뀐 부분이 있다면 적어보세요.",
      8: "유아의 관점에서 오늘의 디지털 활동은 어떤 의미가 있을지 생각해보세요.",
      9: "오늘 수업 내용과 이전 주차 내용을 연결해서 볼 때 어떤 흐름이 보이나요?",
      10: "디지털 시민성, 윤리, 책임과 관련하여 오늘 수업에서 중요하다고 느낀 점을 적어보세요.",
      11: "오늘 배운 내용을 바탕으로 예비교사로서 자신이 더 준비해야 할 점은 무엇인가요?",
      12: "수업 속 디지털 활용이 놀이, 표현, 소통과 어떻게 연결될 수 있는지 자신의 생각을 적어보세요.",
      13: "이번 학기 디지털 교육 수업을 돌아보며 가장 의미 있었던 배움과 남은 질문을 적어보세요."
    };

    const colors = ["yellow", "pink", "blue", "green", "lilac"];

    const weekEl = document.getElementById("week");
    const classEl = document.getElementById("class");
    const nicknameEl = document.getElementById("nickname");
    const contentEl = document.getElementById("content");
    const questionTextEl = document.getElementById("questionText");
    const statusMsgEl = document.getElementById("statusMsg");
    const notesWrapEl = document.getElementById("notesWrap");
    const boardSubEl = document.getElementById("boardSub");

    function updateQuestion() {
      const week = weekEl.value;
      questionTextEl.textContent = QUESTIONS[week] || "이번 주 질문을 준비 중입니다.";
      boardSubEl.textContent = `${week}주차 생각들을 보여줍니다.`;
      loadNotes();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d)) return "";
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    async function saveNote() {
      const week = Number(weekEl.value);
      const className = classEl.value;
      const nickname = nicknameEl.value.trim();
      const content = contentEl.value.trim();

      if (!week || !className || !nickname || !content) {
        statusMsgEl.style.color = "#c62828";
        statusMsgEl.textContent = "주차, 반, 별명, 내용을 모두 입력해주세요.";
        return;
      }

      statusMsgEl.style.color = "#475467";
      statusMsgEl.textContent = "저장 중입니다...";

      const { error } = await supabaseClient
        .from("notes")
        .insert([
          {
            nickname: nickname,
            class: className,
            week: week,
            content: content
          }
        ]);

      if (error) {
        console.error(error);
        statusMsgEl.style.color = "#c62828";
        statusMsgEl.textContent = "저장에 실패했습니다. 잠시 후 다시 시도해주세요.";
        return;
      }

      contentEl.value = "";
      statusMsgEl.style.color = "#2e7d32";
      statusMsgEl.textContent = "생각이 저장되었습니다.";
      loadNotes();
    }

    async function loadNotes() {
      const week = Number(weekEl.value);

      const { data, error } = await supabaseClient
        .from("notes")
        .select("*")
        .eq("week", week)
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        notesWrapEl.innerHTML = `<div class="empty">게시글을 불러오지 못했습니다.</div>`;
        return;
      }

      if (!data || data.length === 0) {
        notesWrapEl.innerHTML = `<div class="empty">${week}주차에 아직 올라온 생각이 없습니다.</div>`;
        return;
      }

      const html = data.map((item, i) => {
        const color = colors[i % colors.length];
        return `
          <div class="note ${color}">
            <div>
              <div class="meta">${item.week}주차 · ${escapeHtml(item.class)} · ${escapeHtml(item.nickname)}</div>
              <div class="content">${escapeHtml(item.content).replace(/\n/g, "<br>")}</div>
            </div>
            <div class="time">${formatDate(item.created_at)}</div>
          </div>
        `;
      }).join("");

      notesWrapEl.innerHTML = `<div class="notes-grid">${html}</div>`;
    }

    weekEl.addEventListener("change", updateQuestion);

    updateQuestion();
    setInterval(loadNotes, 5000);
  </script>
</body>
</html>
